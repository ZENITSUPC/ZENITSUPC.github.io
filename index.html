<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio en Vivo - Oxígeno</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/favicon.ico">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('pexels-ahmetyuksek-30882618.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            position: relative;
            color: #e9f6ff;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.75), rgba(0, 14, 35, 0.45));
            animation: breathe 15s infinite ease-in-out;
            backdrop-filter: blur(2px);
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, transparent 45%, rgba(0, 0, 0, 0.55) 80%, rgba(0, 0, 0, 0.8) 100%);
            mix-blend-mode: multiply;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            flex-grow: 1; /* Permite que el contenedor ocupe el espacio disponible */
            justify-content: center;
            padding: 24px 18px 32px;
        }

        .player {
            width: min(90vw, 420px);
            padding: 40px 32px 32px;
            background: linear-gradient(140deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.12);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }
        .player::before {
            content: '';
            position: absolute;
            width: 220%;
            height: 220%;
            background: conic-gradient(from 120deg, rgba(0, 191, 255, 0.18), rgba(255, 255, 255, 0.05), rgba(123, 31, 162, 0.18), rgba(0, 191, 255, 0.18));
            animation: rotate 18s infinite linear;
            z-index: 0;
            pointer-events: none;
            filter: blur(35px);
        }
        .player::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 30px;
            background: radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.2), transparent 35%), radial-gradient(circle at 80% 10%, rgba(0, 191, 255, 0.2), transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        .player h1 {
            color: #f5fbff;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            margin-bottom: 28px;
            animation: glow 2s infinite alternate;
            position: relative;
            z-index: 1;
        }
        .controls {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 16px;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 14px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 16px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.28);
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.3s ease;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
        }
        .btn:hover {
            background: rgba(0, 180, 255, 0.35);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 180, 255, 0.45);
        }
        .btn i {
            color: white;
        }
        .volume-slider {
            width: 100%;
            appearance: none;
            height: 6px;
            background: linear-gradient(90deg, rgba(0, 180, 255, 0.8), rgba(255, 255, 255, 0.6));
            border-radius: 999px;
            outline: none;
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.25);
        }
        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e9f6ff;
            border: 2px solid rgba(0, 180, 255, 0.6);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .volume-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e9f6ff;
            border: 2px solid rgba(0, 180, 255, 0.6);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .volume-slider::-webkit-slider-thumb:hover,
        .volume-slider::-moz-range-thumb:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 22px rgba(0, 180, 255, 0.4);
        }
        .live-indicator {
            color: #ffecec;
            font-size: 14px;
            margin-top: 24px;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.8);
            animation: pulse 1.5s infinite;
            position: relative;
            z-index: 1;
            padding: 8px 14px;
            border-radius: 999px;
            background: linear-gradient(120deg, rgba(255, 66, 66, 0.9), rgba(255, 99, 132, 0.85));
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.35);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
            position: relative;
        }
        .live-indicator::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: inherit;
            background: rgba(255, 77, 77, 0.35);
            filter: blur(10px);
            z-index: -1;
        }

        .social-bar {
            display: flex;
            gap: 18px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
            z-index: 1;
            min-width: min(420px, 90vw);
            justify-content: center;
        }
        .social-btn {
            color: #fff;
            font-size: 24px;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.25s ease;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 8px 18px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            outline: none;
        }
        .social-btn:hover {
            transform: translateY(-2px) scale(1.08);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.4), 0 10px 24px rgba(0, 0, 0, 0.35);
        }
        .social-btn.x:hover { color: #1DA1F2; }
        .social-btn.instagram:hover { color: #E1306C; }
        .social-btn.whatsapp:hover { color: #25D366; }

        /* Copyright */
        .copyright {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 0;
            z-index: 1;
            backdrop-filter: blur(6px);
        }

        .btn:focus-visible,
        .social-btn:focus-visible {
            outline: 2px solid rgba(0, 180, 255, 0.9);
            outline-offset: 2px;
        }
        .volume-slider:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 180, 255, 0.35);
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.8; }
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes glow {
            0% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
            100% { text-shadow: 0 0 20px rgba(255, 255, 255, 1); }
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @media (max-width: 480px) {
            .player {
                padding: 32px 22px 24px;
                border-radius: 28px;
            }
            .player h1 {
                font-size: 20px;
                letter-spacing: 2px;
                text-align: center;
            }
            .controls {
                grid-template-columns: auto 1fr auto;
                gap: 12px;
                padding: 12px 14px;
            }
            .btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
                padding: 14px;
            }
            .live-indicator {
                font-size: 13px;
                padding: 7px 12px;
            }
            .social-bar {
                gap: 12px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Reproductor -->
        <div class="player">
            <h1>Radio Oxígeno</h1>
            <audio id="radioPlayer" style="display: none;"></audio>
            <div class="controls">
                <button id="playPause" class="btn"><i class="fas fa-play"></i></button>
        <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.01" value="1">
        <button id="mute" class="btn"><i class="fas fa-volume-up"></i></button>
            </div>
            <div class="live-indicator">🔴 En Vivo</div>
        </div>

        <!-- Redes sociales -->
        <div class="social-bar">
            <a href="https://x.com/zenitswgg?t=mtvckSmolEwSjpwupRsxYA&s=09" target="_blank" class="social-btn x"><i class="fab fa-twitter"></i></a>
            <a href="https://www.instagram.com/zenitswgg?igsh=MWUyZWR6bTBmNDYxag==" target="_blank" class="social-btn instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/+51929031756" target="_blank" class="social-btn whatsapp"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <!-- Copyright -->
    <div class="copyright">
        © 2025 Jameswgg. Todos los derechos reservados.
    </div>

    <script>
        const audio = document.getElementById('radioPlayer');
        const playPauseBtn = document.getElementById('playPause');
        const muteBtn = document.getElementById('mute');
        const volumeSlider = document.getElementById('volume');
        const streamUrl = 'https://mdstrm.com/audio/5fab0687bcd6c2389ee9480c/live.m3u8';
        let isPlaying = false;

        // Configurar HLS
        let hls;
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(audio);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                console.log("Stream listo para reproducir");
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                console.error("Error en HLS:", data);
            });
        } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            audio.src = streamUrl;
            audio.addEventListener('loadedmetadata', () => {
                console.log("Stream nativo listo");
            });
        } else {
            console.log("Tu navegador no soporta HLS.");
        }

        // Controles
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    isPlaying = true;
                }).catch(err => console.error("Error al reproducir", err));
            }
        });

        muteBtn.addEventListener('click', () => {
            audio.muted = !audio.muted;
            muteBtn.innerHTML = audio.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        });
        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value;
            audio.muted = (volumeSlider.value == 0);
            muteBtn.innerHTML = audio.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        });
    </script>
</body>
</html>
